version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: goapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: goapp_db
    ports:
      - "7000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - goapp-network

  redis:
    image: redis:7-alpine
    container_name: goapp-redis
    restart: unless-stopped
    ports:
      - "7001:6379"
    volumes:
      - redis_data:/data
    networks:
      - goapp-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: goapp-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "7002:8081"
    depends_on:
      - redis
    networks:
      - goapp-network

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: goapp-app
    ports:
      - "7003:7003"
    depends_on:
      - redis
      - postgres
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432  
      REDIS_ADDR: redis:6379
    volumes:
      - .:/app
    networks:
      - goapp-network

  # ── Worker ─────────────────────────────────────────────────────────────────
  # Separate process — processes background tasks from Redis queues.
  # Scales independently from the HTTP server.
  # Scale up workers if queue is backing up:
  #   docker-compose up -d --scale worker=3
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: goapp-worker
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_ADDR: redis:6379
    networks:
      - goapp-network
  
  worker-dashboard:
    image: hibiken/asynqmon:latest
    container_name: goapp-worker-dashboard
    restart: unless-stopped
    ports:
      - "7004:8080"
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
    depends_on:
      - redis
    networks:
      - goapp-network

volumes:
  postgres_data:
  redis_data:

networks:
  goapp-network:
    driver: bridge